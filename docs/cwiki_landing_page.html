<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CWiki 知识库管理平台产品介绍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="#overview">
          <span class="brand-mark" aria-hidden="true">
            <i></i>
            <i></i>
          </span>
          <span class="brand-name">CWiki 产品介绍</span>
        </a>
        <nav class="topnav">
          <a href="./index.html">返回门户</a>
          <a href="#overview">一页概述</a>
          <a href="#architecture">功能架构</a>
        </nav>
      </header>

      <main>
        <section class="hero-section panel" id="overview">
          <div class="section-head">
            <div class="title-row">
              <span class="title-prefix">CWiki:</span>
              <h1>国产自研知识库管理平台</h1>
            </div>
            <div class="logo-ghost">嘉为蓝鲸</div>
          </div>

          <div class="overview-lead">
            <h3>1个平台 + 5类核心能力 + N个研发知识场景</h3>
            <p>
              面向企业知识管理与研发协同场景，打造安全可控、协同友好、与 DevOps 深度融合的一体化知识库平台。
            </p>
          </div>

          <div class="overview-stage">
            <section class="overview-side overview-side-left">
              <h3>基础与协同能力</h3>
              <div class="mini-pill-grid" id="base-pills"></div>
            </section>

            <section class="overview-center">
              <div class="hex-cluster" id="core-hexes"></div>
            </section>

            <section class="overview-side overview-side-right">
              <h3>典型应用场景</h3>
              <div class="scene-list" id="overview-scenes"></div>
            </section>
          </div>

          <section class="value-section">
            <div class="value-title">核心价值</div>
            <div class="value-grid" id="value-grid"></div>
          </section>

        </section>

        <section class="arch-section panel" id="architecture">
          <div class="section-head">
            <div class="title-row">
              <span class="title-prefix">CWiki:</span>
              <h2>产品功能架构</h2>
            </div>
            <div class="logo-ghost">嘉为蓝鲸</div>
          </div>

          <div class="architecture-board">
            <div class="board-main">
              <div class="band scenario-band">
                <div class="band-title">应用场景</div>
                <div class="pill-row" id="scenario-pills"></div>
              </div>

              <div class="capability-area">
                <div class="band-title capability-title">应用能力</div>
                <div class="capability-grid" id="capability-grid"></div>
              </div>

            </div>

            <aside class="integration-side">
              <div class="band-title">开放和集成</div>
              <div class="integration-pills" id="integration-pills"></div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
